services:
  # ── Nginx 反向代理（公网入口）────────────────
  nginx:
    image: nginx:alpine
    container_name: shortener-nginx
    ports:
      - "${HTTPS_PORT:-2053}:2053"
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/shortener.conf:/etc/nginx/custom/shortener.conf:ro
      - ${TLS_CERT_PATH:-./nginx/ssl/cert.pem}:/etc/nginx/ssl/cert.pem:ro
      - ${TLS_KEY_PATH:-./nginx/ssl/key.pem}:/etc/nginx/ssl/key.pem:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - shortener-net
    restart: unless-stopped

  # ── 前端（React SPA）────────────────────────
  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: shortener-frontend
    expose:
      - "80"
    networks:
      - shortener-net
    restart: unless-stopped

  # ── 后端（Go API）────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    container_name: shortener-backend
    expose:
      - "8888"
    env_file:
      - .env
    environment:
      - DOMAIN=${DOMAIN:-incipe.top}
      - HTTPS_PORT=${HTTPS_PORT:-2053}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - shortener-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8888/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # ── MySQL 数据库─────────────────────────────
  mysql:
    image: mysql:8.4
    container_name: shortener-mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./short_url_map.sql:/docker-entrypoint-initdb.d/01_short_url_map.sql
      - ./sequence.sql:/docker-entrypoint-initdb.d/02_sequence.sql
      - ./alter_short_url_map.sql:/docker-entrypoint-initdb.d/03_alter_short_url_map.sql
      - ./alter_click_count.sql:/docker-entrypoint-initdb.d/04_alter_click_count.sql
    networks:
      - shortener-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 30s

  # ── Redis 缓存───────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: shortener-redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - shortener-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Kafka 消息队列───────────────────────────
  kafka:
    image: apache/kafka:latest
    container_name: shortener-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - shortener-net
    restart: unless-stopped

  # ── Jaeger 链路追踪──────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: shortener-jaeger
    user: root
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
    expose:
      - "4317"
      - "4318"
    volumes:
      - jaeger_data:/badger
    networks:
      - shortener-net
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
  kafka_data:
  jaeger_data:
  nginx_logs:

networks:
  shortener-net:
    driver: bridge
