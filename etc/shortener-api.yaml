Name: shortener-api
Host: 0.0.0.0
Port: 8888
ShortUrlDB:
  DSN: "${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(mysql:3306)/${MYSQL_DATABASE}?charset=utf8mb4&parseTime=True&loc=Local"
Sequence:
  DSN: "${MYSQL_USER}:${MYSQL_PASSWORD}@tcp(mysql:3306)/${MYSQL_DATABASE}?charset=utf8mb4&parseTime=True&loc=Local"
CacheRedis:
  - Host: redis:6379
    Pass: "${REDIS_PASSWORD}"
BaseString: J0rs12O5TUV8IW7D9aBdXeCfghiMQj3klmop6qtuvbcwx4zAEFGHKLNnPRYSZy
ShortUrlBlackList:
  ["version", "fuxk", "stupid", "convert", "health", "api", "css", "js", "preview", "metrics"]
ShortDomain: "${DOMAIN}"

# LLM 大模型配置
LLM:
  Enabled: True
  BaseURL: "https://api.deepseek.com"
  APIKey: "${LLM_API_KEY}"
  Model: "deepseek-chat"

# 安全巡检配置
Safety:
  Enabled: true
  BlackListDomains: []

# 可观测性配置
Otel:
  Name: "shortener-api"
  Endpoint: "jaeger:4317"
  Sampler: 1.0

# Kafka 消息队列配置
Kafka:
  Enabled: true
  Brokers:
    - "kafka:9092"
  Topics:
    AIAnalysis: "ai-analysis"
    ClickEvent: "click-events"
    SafetyAlert: "safety-alerts"

# 认证配置
Auth:
  JWTSecret: "${JWT_SECRET}"
  Expiry: 604800
  Admin:
    Username: "${ADMIN_USERNAME}"
    Password: "${ADMIN_PASSWORD}"

# CORS 跨域配置
CORS:
  AllowOrigins:
    - "https://${DOMAIN}:${HTTPS_PORT}"
