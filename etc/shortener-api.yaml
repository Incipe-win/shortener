Name: shortener-api
Host: 0.0.0.0
Port: 8888
ShortUrlDB:
  DSN: root:root@tcp(127.0.0.1:13306)/sql_test?charset=utf8mb4&parseTime=True&loc=Local
Sequence:
  DSN: root:root@tcp(127.0.0.1:13306)/sql_test?charset=utf8mb4&parseTime=True&loc=Local
CacheRedis:
  - Host: 127.0.0.1:16379
BaseString: J0rs12O5TUV8IW7D9aBdXeCfghiMQj3klmop6qtuvbcwx4zAEFGHKLNnPRYSZy
ShortUrlBlackList:
  ["version", "fuxk", "stupid", "convert", "health", "api", "css", "js", "preview", "metrics"]
ShortDoamin: shortener.com

# LLM 大模型配置
LLM:
  Enabled: True
  BaseURL: "https://api.deepseek.com"
  APIKey: "${LLM_API_KEY}"
  Model: "deepseek-chat"

# 安全巡检配置
Safety:
  Enabled: true
  BlackListDomains: []

# 可观测性配置
Otel:
  Name: "shortener-api"
  Endpoint: "localhost:4317"
  Sampler: 1.0

# Kafka 消息队列配置
Kafka:
  Enabled: true
  Brokers:
    - "127.0.0.1:9092"
  Topics:
    AIAnalysis: "ai-analysis"
    ClickEvent: "click-events"
    SafetyAlert: "safety-alerts"

# 认证配置
Auth:
  JWTSecret: "shortener-jwt-secret-2026"
  Expiry: 86400
  Admin:
    Username: "admin"
    Password: "${ADMIN_PASSWORD:admin123}"

# CORS 跨域配置
CORS:
  AllowOrigins:
    - "http://localhost:3000"
