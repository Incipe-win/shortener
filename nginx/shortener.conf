# ── HTTP 强制跳转到 HTTPS:2053 ────────────
server {
    listen 80;
    server_name incipe.top www.incipe.top;
    return 301 https://$host:2053$request_uri;
}

# ── HTTPS 主配置 ─────────────────────────
server {
    listen 2053 ssl http2;
    server_name incipe.top www.incipe.top;

    # TLS 证书（通过 docker-compose 挂载）
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # TLS 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # 安全响应头
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 请求体大小限制（防止恶意上传）
    client_max_body_size 10m;

    # ── 限流配置 ──────────────────────────
    # 短链接跳转不限流，API 接口限流
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    # ── Gzip 压缩 ────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_vary on;
    gzip_min_length 1024;

    # ── 短链接跳转（最高优先级）────────────
    # 匹配单个路径段，避免和前端路由冲突
    location ~ ^/([a-zA-Z0-9]{1,20})$ {
        proxy_pass http://backend:8888/$1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # 短链接跳转不需要限流，避免影响用户体验
    }

    # ── API 限流路由 ─────────────────────
    location /api/ {
        limit_req zone=api_limit burst=40 nodelay;

        # 去掉 /api 前缀，转发到后端
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://backend:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── 认证接口额外限流 ─────────────────
    location /api/auth/login {
        limit_req zone=auth_limit burst=3 nodelay;

        rewrite ^/api/auth/login /auth/login break;
        proxy_pass http://backend:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Prometheus metrics（仅内网可访问）─
    location /api/metrics {
        # 如果需要限制仅内网访问，取消下面注释
        # allow 127.0.0.1;
        # deny all;

        rewrite ^/api/metrics /metrics break;
        proxy_pass http://backend:8888;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── 健康检查 ─────────────────────────
    location /health {
        access_log off;
        proxy_pass http://backend:8888/health;
        proxy_set_header Host $host;
    }

    # ── 前端 SPA（代理到前端容器）──────────────
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 日志
    access_log /var/log/nginx/shortener_access.log;
    error_log /var/log/nginx/shortener_error.log warn;
}
